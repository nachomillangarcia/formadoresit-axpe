{{ $apiversion := "apps/v1" }}

apiVersion: {{ $apiversion }}
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
  namespace: {{ .Release.Namespace }} 

spec:

  replicas: 2

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: {{ .Release.Name }}

  template:  
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      {{- if .Values.initContainer }}
      initContainers:
        - name: init-myservice
          image: busybox:1.28
          command: ['sh', '-c', "until nslookup java-api.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for myservice; sleep 2; done"]
      {{- end }}
      imagePullSecrets:
      - name: openshift-public-registry
      containers:
        - name: java-api
          {{- with .Values.image }}
          image: {{ printf "%s/%s:%s" .username .repository .imageVersion }}
          {{- end }}


          ports:
          - containerPort: {{ .Values.containerPort | default 8080 }}
          resources:
            requests:
              memory: 150Mi
              cpu: 100m
            limits:
              memory: 150Mi
              cpu: 100m

          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.containerPort | default 8080 }}
            failureThreshold: 3
            periodSeconds: 10

          startupProbe:
            httpGet:
              path: /
              port: {{ .Values.containerPort | default 8080 }}
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.containerPort | default 8080 }}
            failureThreshold: 1
            periodSeconds: 10

          env:
          {{- range $name, $value := .Values.envVars }}
          - name: {{ $name }}
            value: {{ $value }}
          {{- end }}
          
          - name: LOG_LEVEL
            valueFrom:
              configMapKeyRef:
                name: java-api-config
                key: LOG_LEVEL

          {{- with .Values.nodeNameEnvVar }}
          - name: {{ .name }}
            valueFrom:
              fieldRef:
                fieldPath: {{ .path }}
          {{- end }}

          volumeMounts:
          - name: config
            mountPath: /config

          # command:
          # - "/bin/bash"

          # args:
          # - -c
          # - "sleep 3600"

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", echo 'Container stopping in 10s…'; sleep 10"]

      terminationGracePeriodSeconds: 60
      volumes:
      - name: config
        configMap:
          name: {{ .Release.Name }}-config


