prometheus:
  prometheusSpec:
    serviceMonitorSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: openebs-hostpath
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

  service:
    type: NodePort


additionalPrometheusRulesMap:
  my-node-requests.rules:
    groups:
      - name: node-requests.rules
        rules:
        - record: node:memory_requests:ratio
          expr: |-
            sum by (node) (kube_pod_container_resource_requests{resource="memory"}) 

            / on(node)

            kube_node_status_allocatable{resource="memory"}

            * 100


alertmanager:
  alertmanagerSpec:
    replicas: 2
  service:
    type: NodePort


grafana:
  service: 
    type: NodePort
    nodePort: 30091
  persistence:
    enabled: true
    storageClassName: openebs-hostpath
  sidecar:
    dashboards:
      enabled: false
    datasources:
      enabled: false